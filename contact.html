<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="author" content="Steven Li" />
        <meta name="description" content="Contact Form of Basic HTML Website" />
        <title>Contact</title>
    </head>
    <body>
        <header>
            <h1>Contact Me</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="articles.html">Articles</a></li>
                </ul>
            </nav>
        </header>

        <hr />

        <main>
            <section>
                <h2>My Contact Form</h2>
                <form action="https://httpbin.org/get" method="get">
                    <fieldset>
                        <legend>Send Me a Message!</legend>
                        <p>
                            <label for="name">Name: </label>
                            <input type="text" name="name" id="name" placeholder="John Doe" required />
                        </p>
                        <p>
                            <label for="email">Email: </label>
                            <input type="text" name="email" id="email" placeholder="abc@example.com" required />
                        </p>
                        <p>
                            <label for="message">Your Message: </label> <br />
                            <textarea
                                name="message"
                                id="message"
                                placeholder="lorem ipsum"
                                rows="10"
                                cols="30"
                                required
                            ></textarea>
                        </p>
                    </fieldset>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </form>
            </section>
        </main>

        <hr />

        <footer>
            <p>Copyright &copy; 2026 Yours Truly</p>
        </footer>
    </body>
</html>
